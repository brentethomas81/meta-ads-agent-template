# Fly config for the Meta Ads Agent Slack bot (separate app from the dashboard).
# Deploy from the repo root:  fly deploy -c fly.bot.toml
app = "CHANGEME-meta-ads-bot"   # rename to something unique on your Fly account
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.bot"

[env]
  DATA_DIR = "/data"
  BRIEFING_TZ = "America/Los_Angeles"
  BRIEFING_HOUR = "6"
  BRIEFING_MINUTE = "0"

# Persistent volume for the learning store (SQLite).
[mounts]
  source = "meta_ads_data"
  destination = "/data"

# Socket Mode = outbound websocket only. No inbound service, no public IP, no ports.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  # Health gate (Lucille pattern): Fly probes /health every 30s. A failing
  # check restarts the machine; on deploy, the new machine must pass /health
  # before it replaces the old one — a broken build never takes the bot down.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
