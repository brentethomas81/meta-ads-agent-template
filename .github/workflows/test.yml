name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  boot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install daemon deps
        run: pip install -r daemon/requirements.txt
      - name: Boot smoke test
        run: python3 tests/test_boot.py
